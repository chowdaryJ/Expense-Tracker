<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Ledger — Expense Tracker</title>

<!-- PWA / installability -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f2420" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #f4f1ea; }
  body {
    font-family: 'Inter', sans-serif;
    color: #1f2420;
    padding: max(24px, env(safe-area-inset-top)) 16px calc(64px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }
  .container { max-width: 640px; margin: 0 auto; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: #8a7a5c; margin-bottom: 4px; }
  h1 { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600; margin: 0; }
  .wallet-icon {
    width: 44px; height: 44px; border-radius: 50%; background: #1f2420;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #f4f1ea; font-size: 20px; font-weight: 600;
  }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .summary-card { background: #fffdf9; border: 1px solid #e3ddd0; border-radius: 10px; padding: 14px 12px; }
  .summary-label { font-size: 11px; color: #8a7a5c; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .summary-value { font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; }
  .summary-value.small { font-family: 'Fraunces', serif; font-size: 17px; }

  form { background: #fffdf9; border: 1px solid #e3ddd0; border-radius: 12px; padding: 16px; margin-bottom: 28px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  input, select {
    padding: 10px 12px; border: 1px solid #ddd5c4; border-radius: 8px; font-size: 14px;
    background: #fbf9f4; color: #1f2420; min-width: 0; font-family: 'Inter', sans-serif; width: 100%;
  }
  input:focus, select:focus, button:focus-visible { outline: 2px solid #b08d3e; outline-offset: 2px; }
  #desc { flex: 2; } #amount { flex: 1; }
  #category { flex: 1; } #date { flex: 1; }
  button#addBtn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px; background: #1f2420; color: #f4f1ea; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; flex-shrink: 0; font-family: 'Inter', sans-serif;
  }
  .error-text { color: #a04b3f; font-size: 13px; margin-top: 4px; display: none; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: #8a7a5c; text-transform: uppercase; margin-bottom: 12px; }
  .bars-section { margin-bottom: 28px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { width: 88px; font-size: 13px; color: #4a463c; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: #e8e2d4; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-value { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #4a463c; width: 80px; text-align: right; flex-shrink: 0; }

  .list-section { background: #fffdf9; border: 1px solid #e3ddd0; border-radius: 12px; padding: 8px 4px; }
  .empty { padding: 24px 16px; text-align: center; font-size: 13px; color: #8a7a5c; }
  .entry-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid #efe9dc; }
  .entry-row:last-child { border-bottom: none; }
  .entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .entry-main { flex: 1; min-width: 0; }
  .entry-desc { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-meta { font-size: 12px; color: #8a7a5c; margin-top: 2px; }
  .entry-amount { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .delete-btn { background: none; border: none; color: #a04b3f; cursor: pointer; padding: 4px; display: flex; align-items: center; flex-shrink: 0; opacity: 1; }
  @media (min-width: 641px) {
    .delete-btn { opacity: 0; transition: opacity 0.15s ease; }
    .entry-row:hover .delete-btn { opacity: 1; }
  }

  ::selection { background: #b08d3e33; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <div class="eyebrow">THE LEDGER</div>
        <h1>Expense Tracker</h1>
      </div>
      <div class="wallet-icon">₹</div>
    </header>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Total tracked</div>
        <div class="summary-value" id="totalValue">₹0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">This month</div>
        <div class="summary-value" id="monthValue">₹0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Top category</div>
        <div class="summary-value small" id="topCatValue">—</div>
      </div>
    </div>

    <form id="entryForm">
      <div class="form-row">
        <input id="desc" placeholder="What was it for?" />
        <input id="amount" placeholder="Amount" type="number" min="0" step="0.01" />
      </div>
      <div class="form-row">
        <select id="category">
          <option value="farming">Farming</option>
          <option value="household" selected>Household</option>
          <option value="travel">Travel</option>
          <option value="business">Business</option>
          <option value="food">Food</option>
          <option value="other">Other</option>
        </select>
        <input id="date" type="date" />
        <button type="submit" id="addBtn">+ Add</button>
      </div>
      <div class="error-text" id="errorText"></div>
    </form>

    <div class="bars-section" id="barsSection" style="display:none;">
      <div class="section-label">By category</div>
      <div id="barsList"></div>
    </div>

    <div class="list-section">
      <div class="section-label" id="countLabel" style="padding: 8px 12px 0;"></div>
      <div id="entriesList"></div>
    </div>
  </div>

<script>
  const CATEGORIES = {
    farming:   { label: "Farming",   color: "#6b7a4f" },
    household: { label: "Household", color: "#a9744f" },
    travel:    { label: "Travel",    color: "#4f6b7a" },
    business:  { label: "Business",  color: "#8a5a8a" },
    food:      { label: "Food",      color: "#b08d3e" },
    other:     { label: "Other",     color: "#7a7a7a" },
  };

  const STORAGE_KEY = "ledger-expense-entries";
  let entries = [];

  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch (e) {
      entries = [];
    }
  }

  function saveEntries() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function formatINR(n) {
    return new Intl.NumberFormat("en-IN", { style: "currency", currency: "INR", maximumFractionDigits: 0 }).format(n);
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function render() {
    // Summary
    const total = entries.reduce((s, e) => s + e.amount, 0);
    const now = new Date();
    const monthEntries = entries.filter(e => {
      const d = new Date(e.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    const monthTotal = monthEntries.reduce((s, e) => s + e.amount, 0);

    const byCategory = Object.keys(CATEGORIES).map(id => ({
      id, ...CATEGORIES[id],
      total: entries.filter(e => e.category === id).reduce((s, e) => s + e.amount, 0)
    })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

    document.getElementById("totalValue").textContent = formatINR(total);
    document.getElementById("monthValue").textContent = formatINR(monthTotal);
    document.getElementById("topCatValue").textContent = byCategory[0] ? byCategory[0].label : "—";

    // Bars
    const barsSection = document.getElementById("barsSection");
    const barsList = document.getElementById("barsList");
    if (byCategory.length > 0) {
      barsSection.style.display = "block";
      const maxBar = Math.max(...byCategory.map(c => c.total));
      barsList.innerHTML = byCategory.map(c => `
        <div class="bar-row">
          <div class="bar-label">${c.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c.total/maxBar*100)}%;background:${c.color};"></div></div>
          <div class="bar-value">${formatINR(c.total)}</div>
        </div>
      `).join("");
    } else {
      barsSection.style.display = "none";
    }

    // Count label
    document.getElementById("countLabel").textContent = entries.length > 0
      ? `${entries.length} entr${entries.length === 1 ? "y" : "ies"}` : "";

    // Entries list
    const list = document.getElementById("entriesList");
    if (entries.length === 0) {
      list.innerHTML = `<div class="empty">Nothing logged yet. Add your first expense above — it'll show up here.</div>`;
    } else {
      const sorted = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1));
      list.innerHTML = sorted.map(e => {
        const cat = CATEGORIES[e.category] || CATEGORIES.other;
        const dateStr = new Date(e.date).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
        return `
          <div class="entry-row" data-id="${e.id}">
            <div class="entry-dot" style="background:${cat.color};"></div>
            <div class="entry-main">
              <div class="entry-desc">${escapeHtml(e.desc)}</div>
              <div class="entry-meta">${cat.label} · ${dateStr}</div>
            </div>
            <div class="entry-amount">${formatINR(e.amount)}</div>
            <button class="delete-btn" data-del="${e.id}" aria-label="Delete ${escapeHtml(e.desc)}">✕</button>
          </div>
        `;
      }).join("");

      list.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-del");
          entries = entries.filter(e => e.id !== id);
          saveEntries();
          render();
        });
      });
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById("date").value = todayStr();

  document.getElementById("entryForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const desc = document.getElementById("desc").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const category = document.getElementById("category").value;
    const date = document.getElementById("date").value || todayStr();
    const errorText = document.getElementById("errorText");

    if (!desc) {
      errorText.textContent = "Enter a description.";
      errorText.style.display = "block";
      return;
    }
    if (!amount || amount <= 0) {
      errorText.textContent = "Enter an amount greater than zero.";
      errorText.style.display = "block";
      return;
    }
    errorText.style.display = "none";

    entries.push({ id: uid(), desc, amount, category, date });
    saveEntries();
    render();

    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("desc").focus();
  });

  loadEntries();
  render();

  // Register service worker for offline/installable support
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
